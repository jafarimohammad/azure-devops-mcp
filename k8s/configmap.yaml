apiVersion: v1
kind: ConfigMap
metadata:
  name: azure-devops-mcp-config
  namespace: mcp-servers
data:
  # Point at your collection URL (not just the server host).
  AZDO_ORG_URL: "https://your-azure-devops-server.example.com/YourCollection"
  # Default project (optional but convenient).
  AZDO_PROJECT: "YourProject"
  AZDO_API_VERSION: "7.0"
  MCP_TRANSPORT: "http"
  PORT: "3000"
  MCP_PATH: "/mcp"
